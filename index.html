<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<!-- OTIMIZAÇÃO IPHONE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>Estoque</title>

<link rel="apple-touch-icon" href="logo.png">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0a1f44,#1b5fbd);
}

/* LOGO */
.logo{
    position:fixed;
    top:10px;
    left:10px;
    width:90px;
}

/* CARD */
.container{
    margin:80px 10px;
    background:white;
    padding:20px;
    border-radius:15px;
}

/* INPUT */
input,select{
    width:100%;
    padding:15px;
    margin:5px 0;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ccc;
}

/* BOTÃO */
button{
    width:100%;
    padding:15px;
    margin:6px 0;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#0a1f44;
    color:white;
}

/* TABELA */
table{
    width:100%;
    margin-top:10px;
    border-collapse:collapse;
}

th{
    background:#0a1f44;
    color:white;
}

td,th{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

.total{
    font-weight:bold;
    background:#eee;
}

/* BOTÃO FIXO */
.bottom{
    position:fixed;
    bottom:10px;
    left:10px;
    width:180px;
    background:red;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="container">

<h2>📦 Estoque</h2>

<select id="produto"></select>
<input id="qtd" type="number" placeholder="Quantidade">
<input id="preco" placeholder="Valor">

<button onclick="entrada()">Salvar</button>
<button onclick="mostrar()">Ver Estoque</button>

<div id="lista"></div>

</div>

<button class="bottom" onclick="zerar()">Zerar</button>

<script>

let nomes={
    camara_26:"Câmara 26",
    camara_20:"Câmara 20",
    cola:"Cola",
    remendo_pequeno:"Remendo Pequeno",
    remendo_grande:"Remendo Grande"
};

let estoque=JSON.parse(localStorage.getItem("estoque"))||{};

function salvar(){
    localStorage.setItem("estoque",JSON.stringify(estoque));
}

function atualizar(){
    let html='<option value="">Escolha</option>';
    for(let i in nomes){
        html+=`<option value="${i}">${nomes[i]}</option>`;
    }
    produto.innerHTML=html;
}

function entrada(){
    let p=produto.value;
    let q=parseInt(qtd.value);
    let v=parseFloat(preco.value.replace(",","."));

    if(!p||!q||!v) return alert("Preencha");

    if(!estoque[p]) estoque[p]={qtd:0,valor:0};

    estoque[p].qtd+=q;
    estoque[p].valor=v;

    salvar();

    alert("Salvo");

    produto.value="";
    qtd.value="";
    preco.value="";
}

function mostrar(){
    let total=0;

    let html="<table><tr><th>Qtd</th><th>Produto</th><th>Unit</th><th>Total</th></tr>";

    for(let i in nomes){
        let item=estoque[i]||{qtd:0,valor:0};
        let t=item.qtd*item.valor;

        total+=t;

        html+=`
        <tr>
        <td>${item.qtd}</td>
        <td>${nomes[i]}</td>
        <td>${item.valor.toFixed(2)}</td>
        <td>${t.toFixed(2)}</td>
        </tr>`;
    }

    html+=`<tr class="total"><td colspan="3">TOTAL</td><td>${total.toFixed(2)}</td></tr></table>`;

    lista.innerHTML=html;
}

function zerar(){
    if(confirm("Zerar tudo?")){
        estoque={};
        salvar();
        mostrar();
    }
}

atualizar();
mostrar();

</script>

</body>
</html>
