<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estoque Mobile</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a1f44;
    color:white;
}

.container{
    margin:20px;
    background:white;
    color:black;
    padding:20px;
    border-radius:15px;
}

input, select{
    width:100%;
    padding:15px;
    margin:5px 0;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:15px;
    margin:6px 0;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#0a1f44;
    color:white;
}

table{
    width:100%;
    margin-top:10px;
    border-collapse:collapse;
}

th{
    background:#0a1f44;
    color:white;
}

td,th{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

.edit{
    width:60px;
    text-align:center;
}

.delete{
    background:red;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
}

.total{
    font-weight:bold;
    background:#eee;
}
</style>
</head>

<body>

<div class="container">

<h2>📦 Estoque</h2>

<select id="produto"></select>
<input id="qtd" type="number" placeholder="Quantidade">
<input id="preco" placeholder="Valor">

<button onclick="entrada()">Salvar</button>
<button onclick="mostrar()">Ver Estoque</button>

<div id="lista"></div>

</div>

<script>

let nomes={
    camara_26:"Câmara 26",
    camara_20:"Câmara 20",
    cola:"Cola",
    remendo_pequeno:"Remendo Pequeno",
    remendo_grande:"Remendo Grande"
};

let estoque=JSON.parse(localStorage.getItem("estoque"))||{};

function salvar(){
    localStorage.setItem("estoque",JSON.stringify(estoque));
}

function atualizar(){
    let html='<option value="">Escolha</option>';
    for(let i in nomes){
        html+=`<option value="${i}">${nomes[i]}</option>`;
    }
    produto.innerHTML=html;
}

function entrada(){
    let p=produto.value;
    let q=parseInt(qtd.value);
    let v=parseFloat(preco.value.replace(",","."));

    if(!p||!q||!v) return alert("Preencha tudo");

    if(!estoque[p]) estoque[p]={qtd:0,valor:0};

    estoque[p].qtd+=q;
    estoque[p].valor=v;

    salvar();

    alert("Salvo!");

    produto.value="";
    qtd.value="";
    preco.value="";
}

// MOSTRAR + EDITAR + DELETAR
function mostrar(){
    let total=0;

    let html="<table><tr><th>Qtd</th><th>Produto</th><th>Total</th><th></th></tr>";

    for(let i in nomes){

        let item=estoque[i]||{qtd:0,valor:0};
        let t=item.qtd*item.valor;
        total+=t;

        html+=`
        <tr>
            <td>
                <input class="edit" type="number" value="${item.qtd}"
                onblur="editar('${i}', this.value)">
            </td>
            <td>${nomes[i]}</td>
            <td>${t.toFixed(2)}</td>
            <td>
                <button class="delete" onclick="deletar('${i}')">🗑️</button>
            </td>
        </tr>`;
    }

    html+=`
    <tr class="total">
        <td colspan="2">TOTAL</td>
        <td>${total.toFixed(2)}</td>
        <td></td>
    </tr>`;

    html+="</table>";

    lista.innerHTML=html;
}

// EDITAR
function editar(id, valor){
    let q=parseInt(valor);

    if(isNaN(q) || q < 0){
        alert("Quantidade inválida");
        mostrar();
        return;
    }

    estoque[id].qtd=q;
    salvar();
}

// DELETAR ITEM
function deletar(id){
    if(confirm("Deseja apagar este item?")){
        delete estoque[id];
        delete nomes[id];
        salvar();
        atualizar();
        mostrar();
    }
}

atualizar();
mostrar();

</script>

</body>
</html>
